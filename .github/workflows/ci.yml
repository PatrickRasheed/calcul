name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du projet
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des dépendances
        working-directory: calculator-api
        run: |
          npm install

      - name: Exécution des tests Jest
        working-directory: calculator-api
        run: |
          npm test